services:
  tudou:
    image: ghcr.io/renalio/tudou:latest
    container_name: tudou
    restart: unless-stopped

    environment:
      TZ: Asia/Shanghai
      TUDOU_ENV: prod

    ports:
      - "8080:8080"

    volumes:
      - ./config:/app/config:ro
      - tudou-storage:/app/storage

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/v1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Optional resource limits:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2.0"
    #       memory: 1G
    #     reservations:
    #       memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  tudou-storage:
    name: tudou-storage
